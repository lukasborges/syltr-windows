name: Windows release candidate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-unsigned-candidate:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build and test Release
        shell: pwsh
        run: |
          dotnet restore Syltr.slnx -p:Configuration=Release -p:RuntimeIdentifier=win-x64
          dotnet test tests/Syltr.Tests/Syltr.Tests.csproj -c Release --no-restore -p:RuntimeIdentifier=win-x64

      - name: Build unsigned x64 MSIX
        shell: pwsh
        run: .\scripts\build-msix.ps1

      - name: Prepare GitHub release assets
        shell: pwsh
        run: |
          New-Item artifacts -ItemType Directory -Force | Out-Null
          $package = Get-ChildItem src/Syltr/AppPackages -Recurse -Filter '*.msix' -File |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          Copy-Item -LiteralPath $package.FullName -Destination artifacts/Syltr-x64.msix
          .\scripts\new-appinstaller.ps1 `
            -Package artifacts/Syltr-x64.msix `
            -OutputPath artifacts/Syltr.appinstaller

      - name: Upload unsigned candidate
        uses: actions/upload-artifact@v7
        with:
          name: syltr-windows-unsigned-candidate
          path: artifacts/
          if-no-files-found: error
          compression-level: 0

      # Public GitHub Releases must be added only after a trusted signing
      # provider returns a signed MSIX whose certificate subject matches the
      # Publisher in Package.appxmanifest.
