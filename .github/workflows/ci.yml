name: Windows CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Syltr.slnx -p:RuntimeIdentifier=win-x64

      - name: Run tests
        run: dotnet test tests/Syltr.Tests/Syltr.Tests.csproj -c Debug --no-restore -p:RuntimeIdentifier=win-x64

      - name: Build unpackaged x64 app
        run: >-
          dotnet build src/Syltr/Syltr.csproj
          -c Debug
          --no-restore
          -p:RuntimeIdentifier=win-x64
          -p:WindowsPackageType=None
          -p:WindowsAppSDKSelfContained=true
          -p:EnableWinAppRunSupport=false
          -p:EnableMsixTooling=false
